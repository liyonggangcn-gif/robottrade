{% extends "base.html" %}
{% block title %}板块管理{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold mb-0"><i class="bi bi-pie-chart me-2 text-info"></i>板块管理</h5>
    <button class="btn btn-sm btn-outline-primary" onclick="loadAll()">
        <i class="bi bi-arrow-clockwise me-1"></i>刷新
    </button>
</div>

<div class="row g-4">
    <!-- 热点板块权重编辑器 -->
    <div class="col-md-5">
        <div class="card h-100">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <span><i class="bi bi-fire me-1 text-danger"></i>热点板块权重</span>
                <button class="btn btn-sm btn-primary" onclick="saveWeights(this)">
                    <i class="bi bi-save me-1"></i>保存权重
                </button>
            </div>
            <div class="card-body">
                <p class="text-muted small mb-3">调整各热点板块的事件驱动权重（0.1 ~ 3.0），影响选股评分</p>
                <div id="hot-topics-container">
                    <div class="text-center py-4 text-muted">
                        <span class="spinner-border spinner-border-sm me-2"></span>加载中...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 行业动量 -->
    <div class="col-md-7">
        <div class="card h-100">
            <div class="card-header bg-white">
                <i class="bi bi-bar-chart-line me-1 text-success"></i>行业20日动量排名
                <small class="text-muted ms-2">（近20交易日涨幅）</small>
            </div>
            <div class="card-body">
                <div class="industry-chart-container mb-3">
                    <canvas id="industryChart"></canvas>
                </div>
                <div id="industry-table-container">
                    <div class="text-center py-2 text-muted">
                        <span class="spinner-border spinner-border-sm me-2"></span>加载中...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let hotTopicsData = {};
let industryChart = null;

// 加载热点板块
async function loadHotTopics() {
    const container = document.getElementById('hot-topics-container');
    try {
        const d = await API.get('/api/sectors/hot');
        hotTopicsData = d.weights || {};
        const topics = d.hot_topics || [];

        if (!topics.length) {
            container.innerHTML = emptyHTML('暂无热点板块配置（请在 settings.yaml 中配置 hot_topics）');
            return;
        }

        const rows = topics.map(t => {
            const w = parseFloat(t.weight) || 1.0;
            return `
                <div class="topic-weight-row">
                    <div class="d-flex align-items-center gap-2">
                        <div class="flex-grow-1">
                            <div class="fw-medium small">${t.name}</div>
                            <div class="text-muted" style="font-size:11px">${t.stock_count || 0} 只股票</div>
                        </div>
                        <div style="width:60px">
                            <input type="number" class="form-control form-control-sm text-center weight-input"
                                   data-topic="${t.name}"
                                   value="${w.toFixed(1)}" min="0.1" max="3.0" step="0.1"
                                   onchange="updateWeightDisplay(this)">
                        </div>
                        <div style="width:80px">
                            <input type="range" class="form-range weight-slider"
                                   data-topic="${t.name}"
                                   value="${w}" min="0.1" max="3.0" step="0.1"
                                   oninput="syncSlider(this)">
                        </div>
                    </div>
                </div>`;
        }).join('');
        container.innerHTML = rows;
    } catch (e) {
        container.innerHTML = errorHTML('加载失败：' + e.message);
    }
}

function syncSlider(slider) {
    const topic = slider.dataset.topic;
    const val = parseFloat(slider.value).toFixed(1);
    // 同步到数字输入框
    const input = document.querySelector(`.weight-input[data-topic="${topic}"]`);
    if (input) input.value = val;
}

function updateWeightDisplay(input) {
    const topic = input.dataset.topic;
    const val = Math.min(3.0, Math.max(0.1, parseFloat(input.value) || 1.0));
    input.value = val.toFixed(1);
    // 同步到滑块
    const slider = document.querySelector(`.weight-slider[data-topic="${topic}"]`);
    if (slider) slider.value = val;
}

async function saveWeights(btn) {
    const inputs = document.querySelectorAll('.weight-input');
    const weights = {};
    inputs.forEach(inp => {
        const topic = inp.dataset.topic;
        const val = parseFloat(inp.value) || 1.0;
        if (topic) weights[topic] = val;
    });
    const origHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>保存中...';
    try {
        const r = await API.post('/api/sectors/weights', { weights });
        showToast(r.success ? 'success' : 'danger', r.message || r.error || '操作完成');
    } catch (e) {
        showToast('danger', '保存失败：' + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = origHTML;
    }
}

// 加载行业动量
async function loadIndustryMomentum() {
    const tableContainer = document.getElementById('industry-table-container');
    try {
        const d = await API.get('/api/sectors/industry');
        const industries = d.industries || [];
        if (!industries.length) {
            tableContainer.innerHTML = emptyHTML('暂无行业动量数据');
            if (industryChart) { industryChart.destroy(); industryChart = null; }
            return;
        }

        // 只取前15个用于图表
        const chartData = industries.slice(0, 15);
        const labels = chartData.map(i => i.industry);
        const values = chartData.map(i => parseFloat(i.mom_20 || 0));
        const colors = values.map(v => v >= 0 ? 'rgba(220,53,69,0.75)' : 'rgba(25,135,84,0.75)');
        const borderColors = values.map(v => v >= 0 ? '#dc3545' : '#198754');

        const ctx = document.getElementById('industryChart').getContext('2d');
        if (industryChart) industryChart.destroy();
        industryChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: '20日涨幅(%)',
                    data: values,
                    backgroundColor: colors,
                    borderColor: borderColors,
                    borderWidth: 1,
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => `${ctx.raw >= 0 ? '+' : ''}${ctx.raw.toFixed(2)}%`
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(0,0,0,0.05)' },
                        ticks: { callback: v => `${v > 0 ? '+' : ''}${v.toFixed(1)}%` }
                    },
                    y: { ticks: { font: { size: 11 } } }
                }
            }
        });

        // 表格显示所有
        const rows = industries.map(i => {
            const mom = parseFloat(i.mom_20 || 0);
            return `<tr>
                <td>${i.industry}</td>
                <td class="text-center">${i.stock_count || 0}</td>
                <td class="text-center">${formatPnl(mom, '%')}</td>
            </tr>`;
        }).join('');
        tableContainer.innerHTML = `
            <div class="table-responsive" style="max-height:200px;overflow-y:auto">
                <table class="table table-sm table-hover mb-0">
                    <thead class="table-light sticky-top">
                        <tr><th>行业</th><th class="text-center">股票数</th><th class="text-center">20日涨幅</th></tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
    } catch (e) {
        tableContainer.innerHTML = errorHTML('加载失败：' + e.message);
        if (d && d.error) console.error(d.error);
    }
}

function loadAll() {
    loadHotTopics();
    loadIndustryMomentum();
}

loadAll();
</script>
{% endblock %}
